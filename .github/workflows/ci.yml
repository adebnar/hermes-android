name: CI

# Build + unit-test every push and PR to the production and beta branches.
# Uses an unsigned debug build, so it needs no secrets.
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - run: chmod +x ./gradlew
      - name: Build & unit test (unsigned debug)
        run: ./gradlew :app:assembleDebug :app:testDebugUnitTest --no-daemon
