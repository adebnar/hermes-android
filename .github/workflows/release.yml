name: Release

# Publish a signed APK when a version tag is pushed.
#   v1.2.3        -> production release  (assembleRelease, marked latest)
#   v1.2.3-beta.1 -> beta pre-release    (assembleBeta, "Hermes Beta", side-by-side)
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   KEYSTORE_BASE64    base64 of keystore/hermes-release.jks
#                      generate with:  base64 -i keystore/hermes-release.jks | pbcopy
#   KEYSTORE_PASSWORD  the keystore (store) password
#   KEY_ALIAS          the key alias (e.g. hermes)
#   KEY_PASSWORD       the key password
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
      - uses: android-actions/setup-android@v4
      - run: chmod +x ./gradlew

      - name: Restore signing keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          mkdir -p keystore
          echo "$KEYSTORE_BASE64" | base64 --decode > keystore/hermes-release.jks
          {
            echo "storeFile=keystore/hermes-release.jks"
            echo "storePassword=$KEYSTORE_PASSWORD"
            echo "keyAlias=$KEY_ALIAS"
            echo "keyPassword=$KEY_PASSWORD"
          } > keystore.properties

      - name: Select variant from tag
        id: v
        run: |
          if [[ "$GITHUB_REF_NAME" == *-beta* ]]; then
            echo "task=assembleBeta"   >> "$GITHUB_OUTPUT"
            echo "apk=app/build/outputs/apk/beta/app-beta.apk" >> "$GITHUB_OUTPUT"
            echo "prerelease=true"      >> "$GITHUB_OUTPUT"
          else
            echo "task=assembleRelease" >> "$GITHUB_OUTPUT"
            echo "apk=app/build/outputs/apk/release/app-release.apk" >> "$GITHUB_OUTPUT"
            echo "prerelease=false"     >> "$GITHUB_OUTPUT"
          fi

      - name: Build signed APK
        run: ./gradlew :app:${{ steps.v.outputs.task }} --no-daemon

      - name: Stage APK with a friendly name
        run: cp "${{ steps.v.outputs.apk }}" "Hermes-${GITHUB_REF_NAME}.apk"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          prerelease: ${{ steps.v.outputs.prerelease }}
          generate_release_notes: true
          files: Hermes-${{ github.ref_name }}.apk
