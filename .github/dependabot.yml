# Dependabot: weekly checks for vulnerable / outdated dependencies.
version: 2
updates:
  - package-ecosystem: gradle
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    target-branch: develop
    labels: ["dependencies"]
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    target-branch: develop
    labels: ["dependencies", "ci"]
